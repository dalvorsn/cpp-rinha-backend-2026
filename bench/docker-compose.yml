services:
  bench:
    build:
      context: ..
      dockerfile: bench/Dockerfile
    container_name: rinha-bench
    # Pin to a single CPU core.
    # cpus throttles to ~37% of one core to approximate single-core performance
    # of the Mac mini 2014 (Core i5-4260U @ 1.4 GHz) relative to this machine
    # (Ryzen 7 7700X @ 5.5 GHz, ~2.7x faster single-thread).
    cpuset: "0"
    deploy:
      resources:
        limits:
          cpus: "0.37"
      restart_policy:
        condition: none
    volumes:
      # benchmark.md is written to the project root on the host
      - ..:/results
