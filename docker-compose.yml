x-api: &api-common
  image: dalvorsn/rinha-backend-2026:profiling
  pull_policy: always
  command: ./api_server
  volumes:
    - socks:/run/sock
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  deploy:
    resources:
      limits:
        cpus: '0.45'
        memory: 120M

x-api-env: &api-env
  API_REFERENCES: resources/references.bin
  API_NORMALIZATION: resources/normalization.json
  API_MCC_RISK: resources/mcc_risk.json
  API_NPROBE: "12"
  API_REPAIR_MIN: "1"
  API_REPAIR_MAX: "4"
  # RPS threshold to switch configs
  API_RPS_THRESHOLD: "300"
  # low-RPS epoll config (used below API_RPS_THRESHOLD)
  API_BUSY_POLL_US: "50"
  API_BUSY_POLL_BUDGET: "8"
  API_PREFER_BUSY_POLL: "1"
  API_EPOLL_TIMEOUT_MS: "1"
  # high-RPS epoll config (used at or above API_RPS_THRESHOLD)
  API_HIGH_BUSY_POLL_US: "0"
  API_HIGH_BUSY_POLL_BUDGET: "0"
  API_HIGH_PREFER_BUSY_POLL: "0"
  API_HIGH_EPOLL_TIMEOUT_MS: "-1"
  # warmup: número de queries fake ao iniciar (0 = desligado)
  API_WARMUP: "300"

services:
  api1:
    <<: *api-common
    container_name: api1
    environment:
      <<: *api-env
      API_CTRL: /run/sock/api1.ctrl

  api2:
    <<: *api-common
    container_name: api2
    environment:
      <<: *api-env
      API_CTRL: /run/sock/api2.ctrl

  lb:
    image: dalvorsn/rinha-backend-2026:profiling
    pull_policy: always
    container_name: lb
    depends_on:
      - api1
      - api2
    command: ./lb
    environment:
      - LB_PORT=9999
      - LB_BACKENDS=/run/sock/api1.ctrl,/run/sock/api2.ctrl
    ports:
      - "9999:9999"
    volumes:
      - socks:/run/sock
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 30M

volumes:
  socks:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=10m"
