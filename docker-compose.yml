x-api-common: &api-common
  build:
    context: .
  volumes:
    - socks:/run/sock
  deploy:
    resources:
      limits:
        cpus: '0.47'
        memory: 150M

services:
  api1:
    <<: *api-common
    container_name: api1
    command: ./api_server /run/sock/api1.sock resources/references.bin resources/normalization.json resources/mcc_risk.json
  

  api2:
    <<: *api-common
    container_name: api2
    command: ./api_server /run/sock/api2.sock resources/references.bin resources/normalization.json resources/mcc_risk.json

  lb:
    build:
      context: .
    container_name: lb
    volumes:
      - socks:/run/sock
    command: /bin/sh -c "sleep 1 && ./lb"
    environment:
      - LB_BACKENDS=/run/sock/api1.sock,/run/sock/api2.sock
      - LB_PORT=9999
    ports:
      - "9999:9999"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: '0.06'
          memory: 50M
volumes:
  socks: