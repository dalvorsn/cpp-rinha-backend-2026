x-api-common: &api-common
  image: dalvorsn/rinha-backend-2026:latest
  pull_policy: always
  volumes:
      - sock:/run/sock
  deploy:
    resources:
      limits:
        cpus: "0.4"
        memory: "160M"

services:
  api1:
    <<: *api-common
    container_name: api1
    command: ./api_server /run/sock/api1.sock resources/references.bin resources/normalization.json resources/mcc_risk.json

  api2:
    <<: *api-common
    container_name: api2
    command: ./api_server /run/sock/api2.sock resources/references.bin resources/normalization.json resources/mcc_risk.json

  lb:
    image: dalvorsn/rinha-backend-2026:latest
    pull_policy: always
    restart: always
    command: /bin/sh -c "sleep 1 && ./lb"
    depends_on:
      - api1
      - api2
    environment:
      - LB_BACKENDS=/run/sock/api1.sock,/run/sock/api2.sock
      - LB_PORT=9999
    ports:
      - "9999:9999"
    volumes:
      - sock:/run/sock
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30M"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

volumes:
  sock:

