x-api: &api
  image: dalvorsn/rinha-backend-2026:luajit
  pull_policy: always
  volumes: [socks:/run/sock]
  ulimits:
    nofile: { soft: 65535, hard: 65535 }
  deploy:
    resources:
      limits: { cpus: '0.45', memory: 160M }

services:
  api1:
    <<: *api
    container_name: api1
    environment: { SOCK_PATH: /run/sock/api1.sock }

  api2:
    <<: *api
    container_name: api2
    environment: { SOCK_PATH: /run/sock/api2.sock }

  lb:
    <<: *api
    container_name: lb
    depends_on: [api1, api2]
    environment: { NGINX_CONF: /app/lua/nginx-lb.conf }
    ports: ["9999:9999"]
    deploy:
      resources:
        limits: { cpus: '0.1', memory: 30M }

volumes:
  socks:
    driver_opts: { type: tmpfs, device: tmpfs, o: "size=1m" }
