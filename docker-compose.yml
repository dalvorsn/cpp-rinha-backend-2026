x-api: &api-common
  image: dalvorsn/rinha-backend-2026:benchmark
  pull_policy: always
  command: ./api_server
  volumes:
    - socks:/run/sock
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  deploy:
    resources:
      limits:
        cpus: '0.475'
        memory: 120M

x-api-env: &api-env
  API_REFERENCES: resources/references.bin
  API_NORMALIZATION: resources/normalization.json
  API_MCC_RISK: resources/mcc_risk.json
  API_NPROBE: "1"
  API_NPROBE_BORDER: "12"
  API_REPAIR_MIN: "1"
  API_REPAIR_MAX: "4"
  API_BUSY_POLL_US: "50"
  API_BUSY_POLL_BUDGET: "8"
  API_PREFER_BUSY_POLL: "1"
  API_EPOLL_TIMEOUT_MS: "1"

services:
  api1:
    <<: *api-common
    container_name: api1
    cpuset: "0"
    environment:
      <<: *api-env
      API_CTRL: /run/sock/api1.ctrl

  api2:
    <<: *api-common
    container_name: api2
    cpuset: "1"
    environment:
      <<: *api-env
      API_CTRL: /run/sock/api2.ctrl

  lb:
    image: dalvorsn/rinha-backend-2026:benchmark
    pull_policy: always
    container_name: lb
    cpuset: "2,3"
    depends_on:
      - api1
      - api2
    command: ./lb
    environment:
      - LB_PORT=9999
      - LB_BACKENDS=/run/sock/api1.ctrl,/run/sock/api2.ctrl
    ports:
      - "9999:9999"
    volumes:
      - socks:/run/sock
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 30M

volumes:
  socks:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=10m"
